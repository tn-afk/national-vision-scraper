services:
  - type: cron
    name: store-count-scraper
    runtime: python
    plan: starter
    region: frankfurt
    branch: main
    schedule: "0 9 * * *"  # Daily at 9 AM UTC (10 AM UK time)
    buildCommand: pip install -r requirements.txt
    startCommand: python scraper.py
    envVars:
      - key: GOOGLE_SPREADSHEET_ID
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REFRESH_TOKEN
        sync: false

  - type: cron
    name: vs-store-count-scraper
    runtime: python
    plan: starter
    region: frankfurt
    branch: main
    schedule: "0 9 * * *"  # Daily at 9 AM UTC (10 AM UK time)
    buildCommand: pip install -r requirements.txt
    startCommand: python vs_scraper.py
    envVars:
      - key: VS_SPREADSHEET_ID
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REFRESH_TOKEN
        sync: false
